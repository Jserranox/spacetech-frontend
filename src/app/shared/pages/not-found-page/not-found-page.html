<!-- NEBULA BACKGROUND -->
<div class="nebula-bg">
  <div class="nebula-cloud nebula-1"></div>
  <div class="nebula-cloud nebula-2"></div>
  <div class="nebula-cloud nebula-3"></div>
  <div id="stars-container" class="absolute inset-0"></div>
</div>

<div class="relative min-h-screen flex items-center justify-center px-4">
  <div class="text-center">
    <!-- ERROR CODE -->
    <div class="neon-border-cyan inline-block px-6 sm:px-8 py-4 sm:py-6 rounded-xl mb-6 sm:mb-8">
      <div class="text-6xl sm:text-7xl lg:text-8xl font-bold text-cyan-400 neon-text-cyan font-press-start-2p">404</div>
      <div class="text-xs sm:text-sm text-white/60 font-press-start-2p mt-2">ERROR EN LA APP</div>
    </div>

    <!-- MESSAGE -->
    <p class="text-white/70 text-base sm:text-lg mb-6 sm:mb-8 max-w-xs sm:max-w-sm mx-auto">
      Parece que te perdiste en el espacio. Esta ruta no existe en nuestro universo.
    </p>

    <!-- BUTTON -->
    <a 
      routerLink="/" 
      class="neon-border-cyan inline-flex items-center gap-2 px-6 sm:px-8 py-3 sm:py-4 bg-black/50 text-white font-bold rounded-lg hover:animate-neon-pulse transition-all duration-300">
      <i class="fa-solid fa-house"></i>
      Volver al inicio
    </a>
  </div>

  <!-- FLOATING astronaut/rocket -->
  <div class="absolute bottom-20 sm:bottom-32 left-1/2 -translate-x-1/2 animate-float opacity-30">
    <svg class="w-12 h-12 sm:w-16 sm:h-16 text-cyan-400" fill="currentColor" viewBox="0 0 24 24">
      <path d="M12 2L8.5 9.5 2 12l5.5 2.5L8.5 18l3.5-2.5L18 12l-5.5-2.5L16.5 9.5 12 2zm-4 14l-2-2 2-2-4 1.5 1.5-4-2 2 2 2-1.5-4 4 1.5z"/>
    </svg>
  </div>
</div>
