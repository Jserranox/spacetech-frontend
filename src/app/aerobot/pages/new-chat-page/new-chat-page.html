<div class="flex flex-col items-center justify-center min-h-[80vh] px-4 sm:px-6 lg:px-8">

  <!-- Logo with neon hover effect - Responsive -->
  <div class="logo-neon-hover transition-all duration-300 mb-4 sm:mb-6">
    <img
      [src]="logoUrl"
      alt="Aerobot Logo"
      class="w-24 h-24 sm:w-28 sm:h-28 md:w-32 md:h-32 object-contain"
    />
  </div>

  <!-- Welcome text - Responsive -->
  <h1 class="text-2xl sm:text-3xl md:text-4xl font-goldman-regular text-white mb-2 sm:mb-4 mt-2 sm:mt-6 text-center">
    ¡Bienvenido, {{ user }}!
  </h1>

  <p class="text-white/60 text-sm sm:text-base mb-6 sm:mb-8 text-center">
    Escribe tu mensaje para comenzar
  </p>

  <!-- Chat input area - Responsive -->
  <div class="
    w-full max-w-xs sm:max-w-sm md:max-w-lg lg:max-w-2xl
    h-28 sm:h-32 md:h-36
    rounded-2xl sm:rounded-3xl
    border-2 border-double bg-neutral
    p-3 sm:p-4
  ">
    <!-- Input row -->
    <div class="flex items-center gap-2 sm:gap-3 mb-2 sm:mb-3">
      <input
        type="text"
        placeholder="¿Qué vamos a hacer hoy?"
        class="
          input input-ghost
          flex-1
          text-sm sm:text-base
          px-2 sm:px-4 "
        />
    </div>

    <div class="flex items-center gap-2 sm:gap-3">

      <!-- add btn -->
      <div class="dropdown dropdown-start">
        <div tabindex="0" role="button" class="btn btn-soft btn-sm sm:btn-md">
          <i class="fa-solid fa-plus text-xs sm:text-sm"></i>
        </div>
        <ul tabindex="-1" class="dropdown-content menu bg-base-100 rounded-box z-1 w-48 sm:w-52 p-2 shadow-sm">
          <li><a class="text-sm sm:text-base">Archivo</a></li>
          <li><a class="text-sm sm:text-base">Proyecto</a></li>
        </ul>
      </div>

      <!-- Agent selector -->
      <div class="dropdown dropdown-start">
        <div tabindex="0" role="button" class="btn btn-soft btn-sm sm:btn-md flex items-center gap-1 sm:gap-2">
          <span class="text-xs sm:text-sm hidden sm:inline">{{ agente }}</span>
          <i class="fa-solid fa-angle-down text-xs"></i>
        </div>
        <ul tabindex="-1" class="dropdown-content menu bg-base-100 rounded-box z-1 w-48 sm:w-52 p-2 shadow-sm">
          <li><a class="text-sm sm:text-base">Ingresa tu API</a></li>
        </ul>
      </div>

      <!-- btn mic -->
      <button class="btn btn-soft btn-sm sm:btn-md">
        <i class="fa-solid fa-microphone text-xs sm:text-sm"></i>
      </button>

      <!-- Btn enviar -->
      <button class="btn btn-soft btn-info btn-sm sm:btn-md ml-auto">
        <i class="fa-solid fa-paper-plane text-xs sm:text-sm"></i>
      </button>
    </div>

  </div>

</div>
